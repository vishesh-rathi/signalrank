# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A 5-stage, highly interpretable ranking pipeline that prioritizes verified
  human insight over naive keyword matching. The system runs entirely locally
  in ~53 seconds (CPU-only, no network) using offline-precomputed embeddings.

  1. Honeypot Filter: A deterministic gate instantly zeroes out impossible or
  self-contradictory profiles.

  2. Domain-Gated Technical Fit: We ignore noisy skill tags and extract deep
  evidence directly from career narratives. Concept depth is graded from
  summaries and job titles, while aspirational statements ("looking to grow
  into AI") and negative mentions are actively suppressed. This score is
  domain-gated to penalize pure-research and computer-vision profiles that the
  JD explicitly rejects. Semantic similarity (bge-small-en-v1.5) is kept to a
  20% minority share to prevent generic AI buzzwords from diluting hard facts.

  3. Contextual Features: We align perfectly with the JD's subtle wants: hitting
  the 5-9 year seniority sweet spot, prioritizing prior product-company
  experience, favoring Pune/Noida, and rewarding strong tenure stability.

  4. Behavioral Multiplier: A strict penalty system [0.30, 1.0] aggressively
  down-weights technically brilliant but unreachable candidates based on poor
  response rates, stale availability, and low credibility.

  5. Extractive Reasoning: The final score is simply (Fit x Multiplier). Every
  submission row includes a transparent reasoning string assembled directly
  from the feature trace—citing grounded profile facts without hallucination,
  and honestly acknowledging the weakest axis for lower-ranked candidates.

